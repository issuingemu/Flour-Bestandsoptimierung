name: Build Executables

on:
  push:
    branches: [ "main" ]
    tags:
     - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas reportlab pyinstaller

      - name: Build Windows Executable
        run: pyinstaller --onefile --windowed --name="Bestands_Tool" flour_bestandsoptimierung.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bestands_Tool-Windows
          path: dist/Bestands_Tool.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas reportlab pyinstaller

      - name: Build Linux Executable
        run: pyinstaller --onefile --windowed --name="Bestands_Tool-Linux" flour_bestandsoptimierung.py

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bestands_Tool-Linux
          path: dist/Bestands_Tool-Linux
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Bestands_Tool-Windows
          path: release_files

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Bestands_Tool-Linux
          path: release_files

      - name: Generate Checksums
        run: |
          cd release_files
          sha256sum * > checksums_sha256.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
